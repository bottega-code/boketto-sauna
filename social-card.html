<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; background: #0a0a09; }

  .card {
    width: 1200px;
    height: 630px;
    position: relative;
    overflow: hidden;
  }

  /* ── PHOTO ── */
  .bg-photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: 55% center;
  }

  /* ── OVERLAYS for text legibility ── */
  /* Strong left-to-right fade so headline zone is dark */
  .overlay-lr {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to right,
      rgba(5,4,3,0.96) 0%,
      rgba(5,4,3,0.88) 32%,
      rgba(5,4,3,0.40) 58%,
      rgba(5,4,3,0.0)  100%
    );
  }
  /* Subtle bottom scrim for bottom bar */
  .overlay-btm {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to top,
      rgba(5,4,3,0.82) 0%,
      rgba(5,4,3,0.0)  40%
    );
  }

  /* ── CONTENT ── */
  .content {
    position: relative;
    z-index: 4;
    height: 100%;
    padding: 52px 64px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    max-width: 1200px;
  }

  /* Top brand line */
  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .brand-name {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 22px;
    letter-spacing: 0.18em;
    color: #f4f1eb;
  }
  .brand-dot {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: #9fb890;
    flex-shrink: 0;
  }
  .brand-sub {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: #6e6e66;
  }

  /* Main headline — must dominate at thumbnail size */
  .headline {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 132px;
    line-height: 0.86;
    letter-spacing: 0.01em;
    color: #f4f1eb;
    flex: 1;
    display: flex;
    align-items: center;
  }
  .headline-inner { display: block; }
  .headline .stone { color: #c8b99a; }

  /* Price block — sits below headline, big enough to survive 4× scale-down */
  .price-block {
    margin-top: 20px;
  }
  .price-from {
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #6e6e66;
    margin-bottom: 4px;
  }
  .price {
    font-family: 'Oswald', sans-serif;
    font-weight: 500;
    font-size: 72px;
    line-height: 1;
    color: #f4f1eb;
    letter-spacing: 0.02em;
  }
  .price-sub {
    font-family: 'DM Sans', sans-serif;
    font-size: 18px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #6e6e66;
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .price-sub span {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .price-sub span::before {
    content: '';
    display: block;
    width: 14px; height: 1px;
    background: #9fb890;
  }
  .veteran {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #5a5a54;
  }
  .veteran svg { color: #c8b99a; }
</style>
</head>
<body>
<div class="card">

  <img class="bg-photo" src="./boketto2.png.png" alt="Boketto infrared sauna interior">
  <div class="overlay-lr"></div>
  <div class="overlay-btm"></div>

  <div class="content">

    <div class="brand">
      <span class="brand-name">BOKETTO</span>
      <div class="brand-dot"></div>
      <span class="brand-sub">Float &amp; Wellness</span>
    </div>

    <div class="headline">
      <span class="headline-inner">INFRA<br><span class="stone">RED</span><br>SAUNA</span>
    </div>

    <div class="price-block">
      <div class="price-from">From</div>
      <div class="price">$2,900</div>
      <div class="price-sub">
        <span>Free Delivery &amp; Setup</span>
        <span>Gold Coast</span>
        <div class="veteran">
          <svg width="12" height="12" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6.5 1l1.3 2.6 2.9.4-2.1 2 .5 2.9L6.5 7.5 3.9 8.9l.5-2.9-2.1-2 2.9-.4z"/>
            <path d="M4 9.5l-1.5 3M9 9.5l1.5 3"/>
          </svg>
          Veteran Owned
        </div>
      </div>
    </div>

  </div>
</div>
</body>
</html>
